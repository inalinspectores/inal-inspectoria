<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Modificar - INAL</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="config.js"></script>
</head>
<body>

<header>
  <h1>INAL - Organizador de Inspecciones</h1>
  <div class="derecha">
    <a class="icono" href="home.html" title="Inicio">&#8962; Menú principal</a>
  </div>
</header>

<main class="ancho">
  <div class="box">
    <h2 style="margin-top:0;">Modificar</h2>
    <p style="font-size:13px; color:#555;">Buscá por N° de CARPETA (ej: CARPETA-0001) o por razón social.</p>
    <input type="text" id="termino" oninput="buscar()" onkeydown="if(event.key==='Enter'){ejecutarBusqueda();}" placeholder="Escribí para buscar...">
    <button onclick="ejecutarBusqueda()">Buscar</button>
  </div>

  <div id="resultados"></div>
</main>

<script>
  exigirSesion();

  let debounce;
  function buscar() {
    clearTimeout(debounce);
    debounce = setTimeout(ejecutarBusqueda, 300);
  }

  async function ejecutarBusqueda() {
    const termino = document.getElementById('termino').value.trim();
    const contenedor = document.getElementById('resultados');
    if (termino.length < 2) { contenedor.innerHTML = ""; return; }

    let resultados = [];

    // ¿Parece un ID de CARPETA? (ej: CARPETA-0001, o simplemente 0001 / 1)
    const match = termino.toUpperCase().match(/(\d+)/);
    if (/CARPETA/i.test(termino) && match) {
      const numero = parseInt(match[1], 10);
      const { data } = await client
        .from('carpeta').select('*, empresa(nombre)').eq('numero_secuencial', numero).is('fusionada_en', null).maybeSingle();
      if (data) resultados = [data];
    }

    if (!resultados.length) {
      const { data: empresas } = await client
        .from('empresa').select('id').ilike('nombre', `%${termino}%`);
      if (empresas && empresas.length) {
        const { data: porEmpresa } = await client
          .from('carpeta').select('*, empresa(nombre)').in('empresa_id', empresas.map(e => e.id)).is('fusionada_en', null);
        resultados = porEmpresa || [];
      }
    }

    if (!resultados.length) {
      contenedor.innerHTML = '<p class="resultado-sugerencia">Sin resultados.</p>';
      return;
    }

    let html = '<table class="resultados"><thead><tr><th>Empresa</th><th>CARPETA</th><th>Dirección</th></tr></thead><tbody>';
    resultados.forEach(c => {
      html += '<tr onclick="window.location.href=\'carpeta_detalle.html?id=' + c.id + '\'">' +
        '<td>' + (c.empresa ? c.empresa.nombre : '') + '</td>' +
        '<td>' + idAmigableCarpeta(c) + '</td>' +
        '<td>' + (c.ubicacion || '') + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    contenedor.innerHTML = html;
  }
</script>

</body>
</html>
