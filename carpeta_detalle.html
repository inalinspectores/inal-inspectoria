<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>carpeta - INAL</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="config.js"></script>
<style>
  .fila-superior {
    display: flex;
    gap: 14px;
    align-items: stretch;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .fila-superior .carpeta-header {
    flex: 1;
    margin-bottom: 0;
    min-width: 250px;
  }
  .columna-botones {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 180px;
  }
  .columna-botones .boton, .columna-botones button {
    margin-top: 0;
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo.png" alt="INAL - Organizador de Inspecciones">
  <div class="derecha">
    <a class="icono" href="home.html" title="Inicio">&#8962; Menú principal</a>
  </div>
</header>

<main class="ancho">
  <div class="fila-superior">
    <div class="carpeta-header" id="carpeta_header">Cargando...</div>
    <div class="columna-botones">
      <a class="boton" id="boton_agregar_evento" href="#">Agregar nuevo</a>
      <button type="button" class="secundario" onclick="alternarModoEdicion()" id="boton_wrench">&#128295; Modificar</button>
    </div>
  </div>

  <div id="zona_debug" style="display:none; margin-bottom:16px;">
    <button type="button" class="secundario" style="max-width:250px; margin-top:0; color:#a00; border-color:#a00;" onclick="eliminarCarpetaCompleta()">&#128465; Eliminar carpeta completa</button>
  </div>

  <div style="display:flex; gap:10px; margin-bottom:10px;">
    <button type="button" class="secundario" id="tab_eventos" style="max-width:220px; margin-top:0;" onclick="cambiarVista('eventos')">Orden cronológico</button>
    <button type="button" class="secundario" id="tab_documentos" style="max-width:250px; margin-top:0;" onclick="cambiarVista('documentos')">Ver por expediente/trámite</button>
  </div>

  <h2 id="titulo_vista">Línea de tiempo</h2>
  <div id="timeline"></div>

  <a class="volver" href="buscar.html">&larr; Volver a la búsqueda</a>
</main>

<script>
  let carpetaId;
  let modoEdicion = false;
  let vistaActual = 'eventos';

  (async () => {
    await exigirSesion();
    const params = new URLSearchParams(window.location.search);
    carpetaId = params.get('id');
    if (!carpetaId) {
      document.getElementById('carpeta_header').textContent = "No se especificó una carpeta.";
      return;
    }

    const { data: chequeo } = await client.from('carpeta').select('fusionada_en').eq('id', carpetaId).maybeSingle();
    if (chequeo && chequeo.fusionada_en) {
      window.location.href = 'carpeta_detalle.html?id=' + chequeo.fusionada_en;
      return;
    }

    if (estaEnModoDebug()) {
      document.getElementById('zona_debug').style.display = 'block';
    }

    document.getElementById('boton_agregar_evento').href = 'crear_evento.html?carpeta=' + carpetaId;
    await cargarCarpeta();
    marcarTabActiva();
    await cargarVistaEventos();
  })();

  function marcarTabActiva() {
    document.getElementById('tab_eventos').style.background = vistaActual === 'eventos' ? '#444' : '';
    document.getElementById('tab_eventos').style.color = vistaActual === 'eventos' ? '#fff' : '';
    document.getElementById('tab_documentos').style.background = vistaActual === 'documentos' ? '#444' : '';
    document.getElementById('tab_documentos').style.color = vistaActual === 'documentos' ? '#fff' : '';
  }

  async function cambiarVista(vista) {
    vistaActual = vista;
    marcarTabActiva();
    document.getElementById('titulo_vista').textContent = vista === 'eventos' ? 'Línea de tiempo' : 'Expedientes y trámites';
    if (vista === 'eventos') await cargarVistaEventos();
    else await cargarVistaDocumentos();
  }

  function alternarModoEdicion() {
    modoEdicion = !modoEdicion;
    document.querySelectorAll('.wrench-evento').forEach(w => {
      w.style.display = modoEdicion ? 'inline-block' : 'none';
    });
    document.getElementById('boton_wrench').innerHTML = modoEdicion ? '&#10005; Cerrar edición' : '&#128295; Modificar';
  }

  async function cargarCarpeta() {
    const { data, error } = await client
      .from('carpeta').select('*, empresa(nombre)').eq('id', carpetaId).maybeSingle();
    const header = document.getElementById('carpeta_header');
    if (error || !data) {
      header.textContent = "No se encontró la carpeta.";
      return;
    }
    header.innerHTML =
      '<div class="id-amigable">' + (data.empresa ? data.empresa.nombre : '(Sin empresa)') + '</div>' +
      '<div class="detalle"><b>Dirección:</b> ' + (data.ubicacion || '-') + '</div>' +
      '<div class="detalle" style="color:#999; font-size:12px; margin-top:10px;">' + idAmigableCarpeta(data) + '</div>';
  }

  // --- Vista eventos (orden cronológico) ---
  async function cargarVistaEventos() {
    const contenedor = document.getElementById('timeline');
    const { data, error } = await client
      .from('evento')
      .select('*, inspector:inspector_lead_id(nombre), evento_acompanante(inspector(nombre)), evento_documento(*)')
      .eq('carpeta_id', carpetaId)
      .order('fecha_evento', { ascending: true });

    if (error) {
      contenedor.innerHTML = '<p class="resultado-sugerencia">Error al cargar la línea de tiempo.</p>';
      return;
    }
    if (!data || !data.length) {
      contenedor.innerHTML = '<p class="resultado-sugerencia">Todavía no hay eventos.</p>';
      return;
    }

    contenedor.innerHTML = "";
    data.forEach((ev, i) => {
      const documentos = ev.evento_documento || [];
      const listaDocs = documentos.map(d => etiquetaTipoDocumento(d.tipo) + ' ' + d.numero).join(', ');
      const titulo = etiquetaTipoEvento(ev.tipo_evento) + ' - ' + formatearFecha(ev.fecha_evento) + (ev.nickname ? ' - ' + ev.nickname : '');
      const acompanantes = (ev.evento_acompanante || []).map(a => a.inspector ? a.inspector.nombre : '').filter(Boolean).join(', ');

      const item = document.createElement('div');
      item.className = 'evento-item';

      const tituloDiv = document.createElement('div');
      tituloDiv.className = 'evento-titulo evento-titulo-fila';
      tituloDiv.innerHTML =
        '<span class="texto-titulo">' + titulo + ' <span style="font-size:12px;">&#9662;</span>' +
        (listaDocs ? '<br><span style="font-size:12px; color:#666; font-weight:normal;">Contiene información de: ' + listaDocs + '</span>' : '') +
        '</span>' +
        '<a class="wrench-evento" style="display:none;" href="evento_editar.html?evento=' + ev.id + '" onclick="event.stopPropagation();">&#128295;</a>';

      const detalleDiv = document.createElement('div');
      detalleDiv.className = 'evento-detalle';

      let html = '';
      if (ev.hora_evento) html += '<p><span class="campo">Hora:</span> ' + formatearHora(ev.hora_evento) + '</p>';
      if (ev.inspector) html += '<p><span class="campo">Inspector líder:</span> <a href="inspector_perfil.html?id=' + ev.inspector_lead_id + '">' + ev.inspector.nombre + '</a></p>';
      if (acompanantes) html += '<p><span class="campo">Acompañantes:</span> ' + acompanantes + '</p>';
      html += '<p><span class="campo">Observaciones:</span> ' + (ev.resumen || '-') + '</p>';

      if (documentos.length) {
        html += '<p class="campo">Documentos:</p>';
        documentos.forEach(d => {
          html += '<div class="box" style="padding:8px 12px; margin:6px 0;">' +
            '<b>' + etiquetaTipoDocumento(d.tipo) + '</b>: ' + d.numero +
            (d.drive_folder_url ? ' — <a href="' + d.drive_folder_url + '" target="_blank">Ver carpeta de Drive</a>' : ' — Sin archivos vinculados') +
            '</div>';
        });
      }
      detalleDiv.innerHTML = html;

      tituloDiv.querySelector('.texto-titulo').onclick = () => {
        detalleDiv.style.display = detalleDiv.style.display === 'block' ? 'none' : 'block';
      };

      item.appendChild(tituloDiv);
      item.appendChild(detalleDiv);
      contenedor.appendChild(item);
    });

    if (modoEdicion) {
      document.querySelectorAll('.wrench-evento').forEach(w => w.style.display = 'inline-block');
    }
  }

  // --- Vista expedientes y trámites ---
  async function cargarVistaDocumentos() {
    const contenedor = document.getElementById('timeline');
    const { data, error } = await client
      .from('evento_documento')
      .select('*, evento(*)')
      .eq('carpeta_id', carpetaId)
      .order('fecha_alta', { ascending: true });

    if (error) {
      contenedor.innerHTML = '<p class="resultado-sugerencia">Error al cargar los documentos.</p>';
      return;
    }
    if (!data || !data.length) {
      contenedor.innerHTML = '<p class="resultado-sugerencia">Todavía no hay expedientes ni trámites.</p>';
      return;
    }

    const grupos = {};
    data.forEach(fila => {
      const clave = fila.tipo + '|' + fila.numero;
      if (!grupos[clave]) {
        grupos[clave] = { tipo: fila.tipo, numero: fila.numero, drive_folder_url: fila.drive_folder_url, primeraAlta: fila.fecha_alta, eventos: [] };
      }
      if (fila.drive_folder_url && !grupos[clave].drive_folder_url) grupos[clave].drive_folder_url = fila.drive_folder_url;
      if (fila.evento) grupos[clave].eventos.push(fila.evento);
    });

    const listaGrupos = Object.values(grupos).sort((a, b) => new Date(a.primeraAlta) - new Date(b.primeraAlta));

    contenedor.innerHTML = "";
    listaGrupos.forEach(g => {
      const item = document.createElement('div');
      item.className = 'evento-item';

      const tituloDiv = document.createElement('div');
      tituloDiv.className = 'evento-titulo';
      tituloDiv.innerHTML = '<span>' + etiquetaTipoDocumento(g.tipo) + ' ' + g.numero + '</span><span>&#9662;</span>';

      const detalleDiv = document.createElement('div');
      detalleDiv.className = 'evento-detalle';

      let html = '';
      html += '<p><span class="campo">Archivos:</span> ' + (g.drive_folder_url ? '<a href="' + g.drive_folder_url + '" target="_blank">Ver carpeta de Drive</a>' : 'Sin archivos vinculados') + '</p>';
      html += '<p class="campo">Formó parte de:</p>';
      g.eventos.forEach(ev => {
        const titulo = etiquetaTipoEvento(ev.tipo_evento) + ' - ' + formatearFecha(ev.fecha_evento) + (ev.nickname ? ' - ' + ev.nickname : '');
        html += '<p>&bull; <a href="#" class="link-volver-evento" data-evento-id="' + ev.id + '">' + titulo + '</a></p>';
      });
      detalleDiv.innerHTML = html;

      detalleDiv.querySelectorAll('.link-volver-evento').forEach(enlace => {
        enlace.addEventListener('click', (e) => {
          e.preventDefault();
          verEventoEnVistaEventos(enlace.dataset.eventoId);
        });
      });

      tituloDiv.onclick = () => {
        detalleDiv.style.display = detalleDiv.style.display === 'block' ? 'none' : 'block';
      };

      item.appendChild(tituloDiv);
      item.appendChild(detalleDiv);
      contenedor.appendChild(item);
    });
  }

  async function verEventoEnVistaEventos(eventoId) {
    vistaActual = 'eventos';
    marcarTabActiva();
    document.getElementById('titulo_vista').textContent = 'Línea de tiempo';
    await cargarVistaEventos();
    setTimeout(() => {
      const el = document.getElementById('timeline');
      el.scrollIntoView({ behavior: 'smooth' });
    }, 100);
  }

  async function eliminarCarpetaCompleta() {
    const confirmar = estaEnModoDebug() ? true : confirm('¿Eliminar esta carpeta por completo, junto con todos sus eventos? Esta acción no se puede deshacer.');
    if (!confirmar) return;
    const { error } = await client.from('carpeta').delete().eq('id', carpetaId);
    if (error) {
      alert('Error al eliminar: ' + error.message);
      return;
    }
    window.location.href = 'buscar.html';
  }
</script>

</body>
</html>
