<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Buscar - INAL</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="config.js"></script>
<style>
  .filtros {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 10px;
    font-size: 14px;
  }
  .filtros label {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 0;
    font-weight: normal;
  }
  .filtros input[type=checkbox] {
    width: auto;
    margin-top: 0;
  }
</style>
</head>
<body>

<header>
  <h1>INAL - Organizador de Inspecciones</h1>
  <div class="derecha">
    <a class="icono" href="home.html" title="Inicio">&#8962; Menú principal</a>
  </div>
</header>

<main class="ancho">
  <div class="box">
    <h2 style="margin-top:0;">Buscar</h2>
    <input type="text" id="termino" oninput="buscar()" onkeydown="if(event.key==='Enter'){ejecutarBusqueda();}" placeholder="Escribí para buscar...">
    <button onclick="ejecutarBusqueda()">Buscar</button>

    <p style="margin-top:16px; margin-bottom:4px;">Estoy buscando:</p>
    <div class="filtros">
      <label><input type="checkbox" id="f_todo" checked onchange="cambioTodo()"> Todo</label>
      <label><input type="checkbox" id="f_carpetas" onchange="cambioFiltroIndividual()"> CARPETAs</label>
      <label><input type="checkbox" id="f_expedientes" onchange="cambioFiltroIndividual()"> Expedientes/Trámites</label>
      <label><input type="checkbox" id="f_inspectores" onchange="cambioFiltroIndividual()"> Inspectores</label>
      <label><input type="checkbox" id="f_empresa" onchange="cambioFiltroIndividual()"> Empresa/Razón social</label>
    </div>
  </div>

  <div id="resultados"></div>
</main>

<script>
  exigirSesion();
  ejecutarBusqueda();

  function cambioTodo() {
    const todoMarcado = document.getElementById('f_todo').checked;
    ['f_carpetas','f_expedientes','f_inspectores','f_empresa'].forEach(id => {
      document.getElementById(id).checked = false;
      document.getElementById(id).disabled = todoMarcado;
    });
    ejecutarBusqueda();
  }

  function cambioFiltroIndividual() {
    document.getElementById('f_todo').checked = false;
    ejecutarBusqueda();
  }

  let debounce;
  function buscar() {
    clearTimeout(debounce);
    debounce = setTimeout(ejecutarBusqueda, 300);
  }

  function filtrosActivos() {
    const todo = document.getElementById('f_todo').checked;
    return {
      inspectores: todo || document.getElementById('f_inspectores').checked,
      expedientes: todo || document.getElementById('f_expedientes').checked,
      empresa: todo || document.getElementById('f_empresa').checked,
      carpetas: todo || document.getElementById('f_carpetas').checked
    };
  }

  async function ejecutarBusqueda() {
    const termino = document.getElementById('termino').value.trim();
    const contenedor = document.getElementById('resultados');
    const filtros = filtrosActivos();

    if (termino.length === 0) {
      const resultadosVacio = [];
      if (filtros.inspectores) {
        const { data: todosInspectores } = await client.from('inspector').select('*').order('nombre');
        (todosInspectores || []).forEach(i => resultadosVacio.push({ tipo: 'INSPECTOR', inspector: i }));
      }
      if (filtros.expedientes || filtros.empresa || filtros.carpetas) {
        const { data: todas } = await client
          .from('carpeta').select('*, empresa(nombre)').is('fusionada_en', null).order('fecha_creacion', { ascending: false });
        (todas || []).forEach(c => resultadosVacio.push({ tipo: 'CARPETA', carpeta: c }));
      }
      mostrarResultados(resultadosVacio);
      return;
    }
    if (termino.length < 2) { contenedor.innerHTML = ""; return; }

    const carpetaIds = new Set();
    const inspectorResultados = [];

    if (filtros.inspectores) {
      const { data: inspectores } = await client.from('inspector').select('*').ilike('nombre', `%${termino}%`);
      (inspectores || []).forEach(i => inspectorResultados.push(i));
    }

    if (filtros.expedientes) {
      const { data: porNumero } = await client
        .from('evento_documento').select('carpeta_id').ilike('numero', `%${termino}%`);
      (porNumero || []).forEach(e => carpetaIds.add(e.carpeta_id));
    }

    if (filtros.empresa) {
      const { data: empresas } = await client.from('empresa').select('id').ilike('nombre', `%${termino}%`);
      if (empresas && empresas.length) {
        const { data: porEmpresa } = await client.from('carpeta').select('id').in('empresa_id', empresas.map(e => e.id));
        (porEmpresa || []).forEach(c => carpetaIds.add(c.id));
      }
    }

    if (filtros.carpetas) {
      const match = termino.match(/(\d+)/);
      if (match) {
        const numero = parseInt(match[1], 10);
        const { data: porNum } = await client.from('carpeta').select('id').eq('numero_secuencial', numero);
        (porNum || []).forEach(c => carpetaIds.add(c.id));
      }
      const { data: ordenes } = await client.from('orden_inspeccion').select('id').ilike('numero_oi', `%${termino}%`);
      if (ordenes && ordenes.length) {
        const { data: eventosPorOI } = await client.from('evento').select('carpeta_id').in('orden_inspeccion_id', ordenes.map(o => o.id));
        (eventosPorOI || []).forEach(e => carpetaIds.add(e.carpeta_id));
      }
    }

    let carpetas = [];
    if (carpetaIds.size) {
      const { data } = await client
        .from('carpeta').select('*, empresa(nombre)').in('id', Array.from(carpetaIds)).is('fusionada_en', null);
      carpetas = data || [];
    }

    const resultadosFinal = [
      ...inspectorResultados.map(i => ({ tipo: 'INSPECTOR', inspector: i })),
      ...carpetas.map(c => ({ tipo: 'CARPETA', carpeta: c }))
    ];

    mostrarResultados(resultadosFinal);
  }

  function mostrarResultados(items) {
    const contenedor = document.getElementById('resultados');
    if (!items.length) {
      contenedor.innerHTML = '<p class="resultado-sugerencia">Sin resultados.</p>';
      return;
    }
    let html = '<table class="resultados"><thead><tr><th>Tipo</th><th>Nombre</th><th>Detalle</th></tr></thead><tbody>';
    items.forEach(item => {
      if (item.tipo === 'CARPETA') {
        const c = item.carpeta;
        html += '<tr onclick="window.location.href=\'carpeta_detalle.html?id=' + c.id + '\'">' +
          '<td>CARPETA</td>' +
          '<td>' + (c.empresa ? c.empresa.nombre : '') + '</td>' +
          '<td>' + idAmigableCarpeta(c) + '</td>' +
          '</tr>';
      } else {
        const i = item.inspector;
        html += '<tr onclick="window.location.href=\'inspector_perfil.html?id=' + i.id + '\'">' +
          '<td>Inspector</td>' +
          '<td>' + i.nombre + '</td>' +
          '<td>Ver PERFIL</td>' +
          '</tr>';
      }
    });
    html += '</tbody></table>';
    contenedor.innerHTML = html;
  }
</script>

</body>
</html>
