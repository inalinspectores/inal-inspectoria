<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear CARPETA - INAL</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="config.js"></script>
</head>
<body>

<header>
  <h1>INAL - Organizador de Inspecciones</h1>
  <div class="derecha">
    <a class="icono" href="home.html" title="Inicio">&#8962; Menú principal</a>
  </div>
</header>

<main>
  <div class="box">
    <h2 style="margin-top:0;">Crear nueva CARPETA</h2>
    <p style="font-size:13px; color:#555;">El primer EVENTO de esta CARPETA se registra automáticamente como Inspección presencial.</p>

    <label>Empresa o Razón social</label>
    <input type="text" id="empresa" placeholder="Ejemplos Ejemplares S.A.I.C.">

    <label>Dirección</label>
    <input type="text" id="ubicacion" placeholder="Estados Unidos 25, C.A.B.A.">
  </div>

  <div class="box">
    <h2 style="margin-top:0;">Datos de la inspección inicial</h2>

    <label>Nombre corto del EVENTO (opcional)</label>
    <input type="text" id="nickname" placeholder="Ej: Caramelos">

    <label>Expedientes / Trámites relacionados</label>
    <div id="documentos_contenedor"></div>
    <button type="button" class="secundario chico" onclick="crearBloqueDocumento(document.getElementById('documentos_contenedor'))">+ Agregar documento</button>

    <label>Orden de Inspección (OI)</label>
    <input type="text" id="numero_oi" placeholder="0000/0000-INAL-000">

    <label>Fecha</label>
    <input type="date" id="fecha_evento">

    <label>Hora</label>
    <input type="time" id="hora_evento">

    <label>Atendido por</label>
    <input type="text" id="atendido_por" placeholder="Nombre de quien atendió la inspección">

    <label>Inspector líder</label>
    <select id="inspector_lider"></select>

    <label>Acompañantes</label>
    <div id="acompanantes_contenedor"></div>
    <button type="button" class="secundario chico" onclick="agregarAcompanante()">+ Agregar acompañante</button>

    <label>Observaciones</label>
    <textarea id="resumen" class="grande" placeholder="Detalle de lo actuado durante la inspección..."></textarea>

    <label>Archivos asociados</label>
    <div class="subir-archivos">(Función de carga de archivos próximamente)</div>
  </div>

  <button onclick="crearCarpeta()">Crear CARPETA</button>
  <div id="mensaje"></div>

  <a class="volver" href="home.html">&larr; Volver al inicio</a>
</main>

<div class="overlay-carga" id="overlay_carga" style="display:none;">Creando nueva CARPETA...</div>

<script>
  exigirSesion();
  cargarInspectoresEnSelect(document.getElementById('inspector_lider'), 'Seleccionar inspector líder');
  crearBloqueDocumento(document.getElementById('documentos_contenedor'));

  let contadorAcompanantes = 0;
  function agregarAcompanante() {
    contadorAcompanantes++;
    const fila = document.createElement('div');
    fila.className = 'acompanante-fila';
    const select = document.createElement('select');
    cargarInspectoresEnSelect(select, 'Seleccionar acompañante');
    const quitar = document.createElement('button');
    quitar.type = 'button';
    quitar.className = 'secundario chico';
    quitar.textContent = 'Quitar';
    quitar.onclick = () => fila.remove();
    fila.appendChild(select);
    fila.appendChild(quitar);
    document.getElementById('acompanantes_contenedor').appendChild(fila);
  }

  async function crearCarpeta() {
    const empresaNombre = document.getElementById('empresa').value.trim();
    const ubicacion = document.getElementById('ubicacion').value.trim();
    const nickname = document.getElementById('nickname').value.trim() || null;
    const documentos = leerBloquesDocumento(document.getElementById('documentos_contenedor'));
    const numero_oi = document.getElementById('numero_oi').value.trim();
    const fecha_evento = document.getElementById('fecha_evento').value;
    const hora_evento = document.getElementById('hora_evento').value;
    const atendido_por = document.getElementById('atendido_por').value.trim() || null;
    const inspector_lead_id = document.getElementById('inspector_lider').value || null;
    const resumen = document.getElementById('resumen').value.trim();
    const mensaje = document.getElementById('mensaje');
    mensaje.textContent = "";
    mensaje.className = "";

    if (!empresaNombre || !fecha_evento) {
      mensaje.textContent = "Completá al menos la empresa y la fecha de la inspección.";
      mensaje.className = "error";
      return;
    }
    if (!documentos.length) {
      mensaje.textContent = "Agregá al menos un expediente o trámite.";
      mensaje.className = "error";
      return;
    }

    const overlay = document.getElementById('overlay_carga');
    overlay.style.display = 'flex';

    try {
      const candidata = await buscarEmpresaCandidata(empresaNombre);
      overlay.style.display = 'none';

      let empresaIdFinal = null;

      if (candidata) {
        const esLaMisma = confirm('Ya tenemos registrada a "' + candidata.nombre + '". ¿Es la misma empresa?');
        if (esLaMisma) {
          const { data: carpetaExistente } = await client
            .from('carpeta').select('*').eq('empresa_id', candidata.id).is('fusionada_en', null).limit(1).maybeSingle();

          if (carpetaExistente) {
            const irAExistente = confirm('Ya existe ' + idAmigableCarpeta(carpetaExistente) + ' para esta empresa. ¿Querés ir ahí para agregar un EVENTO en lugar de crear una CARPETA nueva?');
            if (irAExistente) {
              window.location.href = 'crear_evento.html?carpeta=' + carpetaExistente.id;
              return;
            }
          }
          empresaIdFinal = candidata.id;
        }
      }

      overlay.style.display = 'flex';

      if (!empresaIdFinal) {
        const { data: empresaData, error: empresaError } = await client
          .from('empresa').insert({ nombre: empresaNombre }).select().single();
        if (empresaError) throw empresaError;
        empresaIdFinal = empresaData.id;
      }

      const { data: carpetaData, error: carpetaError } = await client
        .from('carpeta')
        .insert({ empresa_id: empresaIdFinal, ubicacion })
        .select().single();
      if (carpetaError) throw carpetaError;

      const orden_inspeccion_id = await obtenerOCrearOI(numero_oi, fecha_evento, hora_evento, ubicacion);

      const { data: eventoData, error: eventoError } = await client
        .from('evento')
        .insert({
          carpeta_id: carpetaData.id,
          orden_inspeccion_id,
          tipo_evento: 'INSPECCION_PRESENCIAL',
          nickname,
          fecha_evento,
          atendido_por,
          inspector_lead_id,
          resumen
        })
        .select().single();
      if (eventoError) throw eventoError;

      const filasDoc = documentos.map(d => ({
        evento_id: eventoData.id, carpeta_id: carpetaData.id,
        tipo: d.tipo, numero: d.numero, drive_folder_url: d.drive_folder_url
      }));
      await client.from('evento_documento').insert(filasDoc);

      const filas = document.querySelectorAll('#acompanantes_contenedor .acompanante-fila select');
      const acompanantesIds = Array.from(filas).map(s => s.value).filter(v => v);
      if (acompanantesIds.length > 0) {
        await client.from('evento_acompanante').insert(acompanantesIds.map(id => ({ evento_id: eventoData.id, inspector_id: id })));
      }

      overlay.style.display = 'none';
      const idAmigable = idAmigableCarpeta(carpetaData);
      mensaje.innerHTML = 'Se creó la CARPETA correctamente. Puede buscarse por nombre de empresa o usando el identificador "' + idAmigable + '".';
      mensaje.className = "ok";

      const botonVerTimeline = document.createElement('a');
      botonVerTimeline.className = 'boton';
      botonVerTimeline.href = 'carpeta_detalle.html?id=' + carpetaData.id;
      botonVerTimeline.textContent = 'Ver línea de tiempo de esta CARPETA';
      mensaje.appendChild(document.createElement('br'));
      mensaje.appendChild(botonVerTimeline);

    } catch (err) {
      overlay.style.display = 'none';
      mensaje.textContent = "Error: " + err.message;
      mensaje.className = "error";
    }
  }
</script>

</body>
</html>
