<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar EVENTO - INAL</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="config.js"></script>
</head>
<body>

<header>
  <h1>INAL - Organizador de Inspecciones</h1>
  <div class="derecha">
    <a class="icono" href="home.html" title="Inicio">&#8962; Menú principal</a>
  </div>
</header>

<main>
  <div class="box" id="box_formulario" style="display:none;">
    <h2 style="margin-top:0;">Editar EVENTO</h2>

    <label>Tipo de EVENTO</label>
    <select id="tipo_evento" onchange="actualizarCamposCondicionales()"></select>

    <label>Fecha</label>
    <input type="text" id="fecha_evento" placeholder="01/02/2003">

    <label>Nombre corto del EVENTO (opcional)</label>
    <input type="text" id="nickname">

    <label>Documento asociado</label>
    <div id="documentos_contenedor"></div>
    <button type="button" class="secundario chico" onclick="crearBloqueDocumento(document.getElementById('documentos_contenedor'))">+ Agregar documento</button>

    <div id="campos_inspeccion" class="campo-condicional">
      <label>Orden de Inspección (OI)</label>
      <input type="text" id="numero_oi" placeholder="0000/0000-INAL-000">

      <label>Hora</label>
      <input type="text" id="hora_evento" placeholder="00:00">

      <label>Dirección de la inspección</label>
      <input type="text" id="ubicacion_evento">

      <label>Atendido por</label>
      <input type="text" id="atendido_por">

      <label>Inspector líder</label>
      <select id="inspector_lider"></select>

      <label>Acompañantes</label>
      <div id="acompanantes_contenedor"></div>
      <button type="button" class="secundario chico" onclick="agregarAcompanante()">+ Agregar acompañante</button>
    </div>

    <label>Observaciones</label>
    <textarea id="resumen" class="grande"></textarea>

    <label>Archivos asociados</label>
    <div class="subir-archivos">(Función de carga de archivos próximamente)</div>

    <button onclick="guardarCambios()">Guardar cambios</button>
    <button class="secundario" onclick="eliminarEvento()" style="margin-top:10px; color:#a00; border-color:#a00;">Eliminar EVENTO</button>
    <div id="mensaje"></div>
  </div>

  <a class="volver" id="volver_carpeta" href="home.html">&larr; Volver a la CARPETA</a>
</main>

<script>
  let eventoId, carpetaId;

  (async () => {
    await exigirSesion();
    const params = new URLSearchParams(window.location.search);
    eventoId = params.get('evento');
    if (!eventoId) {
      document.getElementById('mensaje').textContent = "No se especificó un EVENTO.";
      return;
    }

    const select = document.getElementById('tipo_evento');
    TIPOS_EVENTO.forEach(t => {
      const op = document.createElement('option');
      op.value = t[0];
      op.textContent = t[1];
      select.appendChild(op);
    });

    await cargarInspectoresEnSelect(document.getElementById('inspector_lider'), 'Seleccionar inspector líder');

    const { data: ev, error } = await client
      .from('evento')
      .select('*, orden_inspeccion(*), evento_acompanante(inspector_id), evento_documento(*)')
      .eq('id', eventoId).maybeSingle();

    if (error || !ev) {
      document.getElementById('mensaje').textContent = "No se encontró el EVENTO.";
      return;
    }

    carpetaId = ev.carpeta_id;
    document.getElementById('volver_carpeta').href = 'carpeta_detalle.html?id=' + carpetaId;

    document.getElementById('tipo_evento').value = ev.tipo_evento;
    document.getElementById('fecha_evento').value = formatearFecha(ev.fecha_evento);
    document.getElementById('nickname').value = ev.nickname || '';
    document.getElementById('resumen').value = ev.resumen || '';

    const contenedorDoc = document.getElementById('documentos_contenedor');
    (ev.evento_documento || []).forEach(d => {
      crearBloqueDocumento(contenedorDoc, { tipo: d.tipo, numero: d.numero, drive_folder_url: d.drive_folder_url });
    });
    if (!(ev.evento_documento || []).length) crearBloqueDocumento(contenedorDoc);

    if (ev.orden_inspeccion) {
      document.getElementById('numero_oi').value = ev.orden_inspeccion.numero_oi || '';
      document.getElementById('hora_evento').value = ev.orden_inspeccion.hora ? formatearHora(ev.orden_inspeccion.hora) : '';
      document.getElementById('ubicacion_evento').value = ev.orden_inspeccion.ubicacion || '';
    }
    document.getElementById('atendido_por').value = ev.atendido_por || '';
    if (ev.inspector_lead_id) document.getElementById('inspector_lider').value = ev.inspector_lead_id;

    const acompananteIds = (ev.evento_acompanante || []).map(a => a.inspector_id);
    for (const id of acompananteIds) {
      await agregarAcompanante(id);
    }

    actualizarCamposCondicionales();
    document.getElementById('box_formulario').style.display = 'block';
  })();

  function actualizarCamposCondicionales() {
    const tipo = document.getElementById('tipo_evento').value;
    document.getElementById('campos_inspeccion').style.display = requiereOI(tipo) ? 'block' : 'none';
  }

  async function agregarAcompanante(preseleccionarId) {
    const fila = document.createElement('div');
    fila.className = 'acompanante-fila';
    const select = document.createElement('select');
    await cargarInspectoresEnSelect(select, 'Seleccionar acompañante');
    if (preseleccionarId) select.value = preseleccionarId;
    const quitar = document.createElement('button');
    quitar.type = 'button';
    quitar.className = 'secundario chico';
    quitar.textContent = 'Quitar';
    quitar.onclick = () => fila.remove();
    fila.appendChild(select);
    fila.appendChild(quitar);
    document.getElementById('acompanantes_contenedor').appendChild(fila);
  }

  async function guardarCambios() {
    const mensaje = document.getElementById('mensaje');
    mensaje.textContent = "";
    mensaje.className = "";

    const tipo_evento = document.getElementById('tipo_evento').value;
    const fecha_texto = document.getElementById('fecha_evento').value.trim();
    const nickname = document.getElementById('nickname').value.trim() || null;
    const documentos = leerBloquesDocumento(document.getElementById('documentos_contenedor'));
    const resumen = document.getElementById('resumen').value.trim();

    if (!documentos.length) {
      mensaje.textContent = "Agregá al menos un documento asociado.";
      mensaje.className = "error";
      return;
    }
    const fecha_evento = convertirFechaTextoAISO(fecha_texto);
    if (!fecha_evento) {
      mensaje.textContent = "La fecha debe tener el formato dd/mm/aaaa (ej: 01/02/2003).";
      mensaje.className = "error";
      return;
    }

    try {
      let orden_inspeccion_id = null;
      let inspector_lead_id = null;
      let atendido_por = null;

      if (requiereOI(tipo_evento)) {
        const numero_oi = document.getElementById('numero_oi').value.trim();
        const hora_evento = document.getElementById('hora_evento').value.trim();
        const ubicacion_evento = document.getElementById('ubicacion_evento').value.trim();
        atendido_por = document.getElementById('atendido_por').value.trim() || null;

        if (hora_evento && !validarHoraTexto(hora_evento)) {
          mensaje.textContent = "La hora debe tener el formato hh:mm (ej: 14:30).";
          mensaje.className = "error";
          return;
        }

        orden_inspeccion_id = await obtenerOCrearOI(numero_oi, fecha_evento, hora_evento || null, ubicacion_evento);
        inspector_lead_id = document.getElementById('inspector_lider').value || null;
      }

      const { error } = await client
        .from('evento')
        .update({
          tipo_evento, nickname, fecha_evento,
          atendido_por, inspector_lead_id, resumen, orden_inspeccion_id
        })
        .eq('id', eventoId);
      if (error) throw error;

      await client.from('evento_documento').delete().eq('evento_id', eventoId);
      const filasDoc = documentos.map(d => ({
        evento_id: eventoId, carpeta_id: carpetaId,
        tipo: d.tipo, numero: d.numero, drive_folder_url: d.drive_folder_url
      }));
      await client.from('evento_documento').insert(filasDoc);

      await client.from('evento_acompanante').delete().eq('evento_id', eventoId);
      const filas = document.querySelectorAll('#acompanantes_contenedor .acompanante-fila select');
      const acompanantesIds = Array.from(filas).map(s => s.value).filter(v => v);
      if (acompanantesIds.length > 0) {
        await client.from('evento_acompanante').insert(acompanantesIds.map(id => ({ evento_id: eventoId, inspector_id: id })));
      }

      mensaje.textContent = "Cambios guardados correctamente.";
      mensaje.className = "ok";
    } catch (err) {
      mensaje.textContent = "Error: " + err.message;
      mensaje.className = "error";
    }
  }

  async function eliminarEvento() {
    const confirmar = estaEnModoDebug() ? true : confirm('¿Seguro que querés eliminar este EVENTO? Esta acción no se puede deshacer.');
    if (!confirmar) return;

    const { error } = await client.from('evento').delete().eq('id', eventoId);
    if (error) {
      document.getElementById('mensaje').textContent = "Error al eliminar: " + error.message;
      document.getElementById('mensaje').className = "error";
      return;
    }
    window.location.href = 'carpeta_detalle.html?id=' + carpetaId;
  }
</script>

</body>
</html>
