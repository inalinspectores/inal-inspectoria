<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agregar evento - INAL</title>
<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
<script src="config.js"></script>
<style>
  .fila-fecha-hora { display: flex; gap: 14px; }
  .fila-fecha-hora > div { flex: 1; }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo.png" alt="INAL - Organizador de Inspecciones">
  <div class="derecha">
    <a class="icono" href="home.html" title="Inicio">&#8962; Menú principal</a>
  </div>
</header>

<main>

  <div class="box" id="box_busqueda">
    <h2 style="margin-top:0;">Seleccionar carpeta</h2>
    <label>Buscar por N° de expediente, empresa o ID de carpeta</label>
    <input type="text" id="busqueda_carpeta" oninput="buscarCarpetas()" placeholder="Escribí para buscar...">
    <div id="resultados_busqueda"></div>
  </div>

  <div class="box" id="box_carpeta_seleccionada" style="display:none;">
    <h2 style="margin-top:0;">Carpeta seleccionada</h2>
    <p id="carpeta_seleccionada_texto"></p>
    <button type="button" class="secundario chico" onclick="deseleccionarCarpeta()">Cambiar carpeta</button>
  </div>

  <div class="box" id="box_formulario" style="display:none;">
    <h2 style="margin-top:0;">Nuevo evento</h2>

    <label>Tipo de evento</label>
    <select id="tipo_evento" onchange="actualizarCamposCondicionales()">
      <option value="">Seleccionar...</option>
    </select>

    <div id="campos_inspeccion" class="campo-condicional">
      <label>Inspector líder</label>
      <select id="inspector_lider"></select>

      <label>Acompañantes</label>
      <div id="acompanantes_contenedor"></div>
      <button type="button" class="secundario chico" onclick="agregarAcompanante()">+ Agregar acompañante</button>
    </div>

    <div class="fila-fecha-hora">
      <div>
        <label>Fecha</label>
        <input type="text" id="fecha_evento" placeholder="01/02/2003">
      </div>
      <div>
        <label>Hora</label>
        <input type="text" id="hora_evento" placeholder="00:00">
      </div>
    </div>

    <label>Nombre corto (opcional)</label>
    <input type="text" id="nickname" placeholder="Ej: Caramelos">

    <label>Documento asociado (EX, trámite, etc.)</label>
    <div id="documentos_contenedor"></div>
    <button type="button" class="secundario chico" onclick="crearBloqueDocumento(document.getElementById('documentos_contenedor'))">+ Agregar documento</button>

    <label>Observaciones</label>
    <textarea id="resumen" class="grande" placeholder="Cualquier detalle importante (opcional)"></textarea>

    <label>Archivos asociados</label>
    <div class="subir-archivos">(Función de carga de archivos próximamente)</div>

    <button id="boton_registrar" onclick="crearEvento()">Registrar evento</button>
    <div id="mensaje"></div>
  </div>

  <a class="volver" href="home.html">&larr; Volver al inicio</a>
</main>

<script>
  let carpetaSeleccionada = null;

  (async () => {
    await exigirSesion();

    const select = document.getElementById('tipo_evento');
    TIPOS_EVENTO.forEach(t => {
      const op = document.createElement('option');
      op.value = t[0];
      op.textContent = t[1];
      select.appendChild(op);
    });

    cargarInspectoresEnSelect(document.getElementById('inspector_lider'), 'Seleccionar inspector líder');

    const params = new URLSearchParams(window.location.search);
    const carpetaId = params.get('carpeta');
    if (carpetaId) {
      const { data } = await client.from('carpeta').select('*, empresa(nombre)').eq('id', carpetaId).maybeSingle();
      if (data) seleccionarCarpeta(data);
    }
  })();

  let debounce;
  function buscarCarpetas() {
    clearTimeout(debounce);
    debounce = setTimeout(async () => {
      const termino = document.getElementById('busqueda_carpeta').value.trim();
      const contenedor = document.getElementById('resultados_busqueda');
      if (termino.length < 2) { contenedor.innerHTML = ""; return; }

      let resultados = [];
      const { data: porEmpresa1 } = await client
        .from('empresa').select('id, nombre').ilike('nombre', `%${termino}%`).limit(10);
      if (porEmpresa1 && porEmpresa1.length) {
        const { data: carpetasPorEmpresa } = await client
          .from('carpeta').select('*, empresa(nombre)').in('empresa_id', porEmpresa1.map(e => e.id)).is('fusionada_en', null).limit(10);
        resultados = carpetasPorEmpresa || [];
      }
      if (!resultados.length) {
        const { data: porNumero } = await client
          .from('evento_documento').select('carpeta_id').ilike('numero', `%${termino}%`).limit(10);
        if (porNumero && porNumero.length) {
          const { data: carpetasPorNumero } = await client
            .from('carpeta').select('*, empresa(nombre)').in('id', porNumero.map(e => e.carpeta_id)).is('fusionada_en', null).limit(10);
          resultados = carpetasPorNumero || [];
        }
      }

      contenedor.innerHTML = "";
      if (!resultados.length) {
        contenedor.innerHTML = '<p class="resultado-sugerencia">Sin resultados.</p>';
        return;
      }
      resultados.forEach(c => {
        const div = document.createElement('div');
        div.className = 'opcion';
        div.style.marginTop = '10px';
        div.innerHTML = '<b>' + (c.empresa ? c.empresa.nombre : '') + '</b><span class="desc">' + idAmigableCarpeta(c) + '</span>';
        div.onclick = () => seleccionarCarpeta(c);
        contenedor.appendChild(div);
      });
    }, 300);
  }

  function seleccionarCarpeta(c) {
    carpetaSeleccionada = c;
    document.getElementById('box_busqueda').style.display = 'none';
    document.getElementById('box_carpeta_seleccionada').style.display = 'block';
    document.getElementById('box_formulario').style.display = 'block';
    document.getElementById('carpeta_seleccionada_texto').textContent =
      (c.empresa ? c.empresa.nombre : '') + ' — ' + idAmigableCarpeta(c);
  }

  function deseleccionarCarpeta() {
    carpetaSeleccionada = null;
    document.getElementById('box_busqueda').style.display = 'block';
    document.getElementById('box_carpeta_seleccionada').style.display = 'none';
    document.getElementById('box_formulario').style.display = 'none';
    document.getElementById('busqueda_carpeta').value = '';
    document.getElementById('resultados_busqueda').innerHTML = '';
  }

  function actualizarCamposCondicionales() {
    const tipo = document.getElementById('tipo_evento').value;
    document.getElementById('campos_inspeccion').style.display = requiereOI(tipo) ? 'block' : 'none';
  }

  let contadorAcompanantes = 0;
  function agregarAcompanante() {
    contadorAcompanantes++;
    const fila = document.createElement('div');
    fila.className = 'acompanante-fila';
    const select = document.createElement('select');
    cargarInspectoresEnSelect(select, 'Seleccionar acompañante');
    const quitar = document.createElement('button');
    quitar.type = 'button';
    quitar.className = 'secundario chico';
    quitar.textContent = 'Quitar';
    quitar.onclick = () => fila.remove();
    fila.appendChild(select);
    fila.appendChild(quitar);
    document.getElementById('acompanantes_contenedor').appendChild(fila);
  }

  async function crearEvento() {
    const mensaje = document.getElementById('mensaje');
    mensaje.textContent = "";
    mensaje.className = "";

    if (!carpetaSeleccionada) {
      mensaje.textContent = "Seleccioná una carpeta primero.";
      mensaje.className = "error";
      return;
    }

    const tipo_evento = document.getElementById('tipo_evento').value;
    const fecha_texto = document.getElementById('fecha_evento').value.trim();
    const hora_texto = document.getElementById('hora_evento').value.trim();
    const nickname = document.getElementById('nickname').value.trim() || null;
    const documentos = leerBloquesDocumento(document.getElementById('documentos_contenedor'));
    const resumen = document.getElementById('resumen').value.trim();

    if (!tipo_evento || !fecha_texto) {
      mensaje.textContent = "Completá al menos el tipo de evento y la fecha.";
      mensaje.className = "error";
      return;
    }
    if (!documentos.length) {
      mensaje.textContent = "Agregá al menos un documento asociado.";
      mensaje.className = "error";
      return;
    }
    const fecha_evento = convertirFechaTextoAISO(fecha_texto);
    if (!fecha_evento) {
      mensaje.textContent = "La fecha debe tener el formato dd/mm/aaaa (ej: 01/02/2003).";
      mensaje.className = "error";
      return;
    }
    if (hora_texto && !validarHoraTexto(hora_texto)) {
      mensaje.textContent = "La hora debe tener el formato hh:mm (ej: 14:30).";
      mensaje.className = "error";
      return;
    }

    try {
      let inspector_lead_id = null;
      let acompanantesIds = [];

      if (requiereOI(tipo_evento)) {
        inspector_lead_id = document.getElementById('inspector_lider').value || null;
        const filas = document.querySelectorAll('#acompanantes_contenedor .acompanante-fila select');
        acompanantesIds = Array.from(filas).map(s => s.value).filter(v => v);
      }

      const { data: eventoData, error: eventoError } = await client
        .from('evento')
        .insert({
          carpeta_id: carpetaSeleccionada.id,
          tipo_evento,
          nickname,
          fecha_evento,
          hora_evento: hora_texto || null,
          inspector_lead_id,
          resumen
        })
        .select().single();
      if (eventoError) throw eventoError;

      const filasDoc = documentos.map(d => ({
        evento_id: eventoData.id, carpeta_id: carpetaSeleccionada.id,
        tipo: d.tipo, numero: d.numero, drive_folder_url: d.drive_folder_url
      }));
      await client.from('evento_documento').insert(filasDoc);

      if (acompanantesIds.length > 0) {
        await client.from('evento_acompanante').insert(acompanantesIds.map(id => ({ evento_id: eventoData.id, inspector_id: id })));
      }

      document.getElementById('boton_registrar').style.display = 'none';
      mensaje.textContent = "Evento registrado, redirigiendo...";
      mensaje.className = "ok";
      setTimeout(() => {
        window.location.href = 'carpeta_detalle.html?id=' + carpetaSeleccionada.id;
      }, 1200);

    } catch (err) {
      mensaje.textContent = "Error: " + err.message;
      mensaje.className = "error";
    }
  }
</script>

</body>
</html>
