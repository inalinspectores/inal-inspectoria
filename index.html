<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>INAL - Organizador de Inspecciones</title>
<script src="supabase.js"></script>
<script src="config.js"></script>
<style>
  body {
    font-family: Georgia, "Times New Roman", serif;
    background: #f4f2ee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .box {
    background: #ffffff;
    border: 1px solid #999;
    padding: 30px 40px;
    width: 320px;
  }
  h1 {
    font-size: 20px;
    text-align: center;
    margin-bottom: 20px;
    color: #222;
  }
  label {
    display: block;
    margin-top: 12px;
    font-size: 14px;
    color: #333;
  }
  input {
    width: 100%;
    padding: 6px;
    margin-top: 4px;
    font-size: 14px;
    box-sizing: border-box;
    border: 1px solid #888;
  }
  button {
    margin-top: 20px;
    width: 100%;
    padding: 8px;
    font-size: 15px;
    background: #444;
    color: white;
    border: none;
    cursor: pointer;
  }
  button:hover {
    background: #222;
  }
  #mensaje {
    margin-top: 12px;
    font-size: 13px;
    text-align: center;
    color: #a00;
  }
  #bienvenida {
    text-align: center;
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="box">
  <img src="logo.png" alt="INAL - Organizador de Inspecciones" style="width:100%; margin-bottom:20px;">

  <div id="formulario-login">
    <label>Usuario (correo)</label>
    <input type="email" id="email" placeholder="admin@inal.anmat">

    <label>Contraseña</label>
    <input type="password" id="password">

    <button onclick="iniciarSesion()">Ingresar</button>
    <div id="mensaje"></div>
  </div>

</div>

<script>
  async function iniciarSesion() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const mensaje = document.getElementById('mensaje');
    mensaje.textContent = "";

    const { error } = await client.auth.signInWithPassword({ email, password });

    if (error) {
      mensaje.textContent = "Error: usuario o contraseña incorrectos.";
      return;
    }

    window.location.href = "home.html";
  }

  // Si ya hay sesión activa, ir directo a la página principal
  window.onload = async () => {
    const { data } = await client.auth.getSession();
    if (data.session) {
      window.location.href = "home.html";
    }
  };
</script>

</body>
</html>
